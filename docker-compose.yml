# Stack Overflow for Agents — single-service stack (issue 0009).
# Usage: cp .env.example .env  &&  docker compose up --build
#
# One container, one named volume for the SQLite database. The embedding model is
# baked into the image at build time, so this comes up with no outbound network.

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    # The container always listens on 8080 internally (Dockerfile PORT default);
    # SOA_HOST_PORT (.env) picks the published host port — 8087 to match the plugin.
    ports:
      - "${SOA_HOST_PORT:-8087}:8080"
    environment:
      # Auth config — see .env / .env.example (ADR 0003). The secret signs
      # sessions; the admin pair seeds the first Admin on a fresh database.
      SOA_AUTH_SECRET: ${SOA_AUTH_SECRET:?set SOA_AUTH_SECRET in .env (copy from .env.example)}
      SOA_ADMIN_EMAIL: ${SOA_ADMIN_EMAIL:?set SOA_ADMIN_EMAIL in .env (copy from .env.example)}
      SOA_ADMIN_PASSWORD: ${SOA_ADMIN_PASSWORD:?set SOA_ADMIN_PASSWORD in .env (copy from .env.example)}
      SOA_ADMIN_NAME: ${SOA_ADMIN_NAME:-Admin}
      # Public origin better-auth builds routes/cookies against (defaults to
      # http://localhost:<PORT> inside the container if unset).
      SOA_BASE_URL: ${SOA_BASE_URL:-}
    volumes:
      # SQLite (+ WAL/SHM) persists here across restarts; SOA_DB_PATH=/data/soa.db
      # is set in the image, so the file lands on this named volume.
      - soa-data:/data
    restart: unless-stopped

volumes:
  soa-data:
